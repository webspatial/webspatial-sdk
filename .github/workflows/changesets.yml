name: Changesets

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write  # Required for OIDC

on:
  push:
    branches:
      - stable
      - main
  workflow_dispatch:

env:
  CI: true
  SKIP_SIMPLE_GIT_HOOKS: 1

jobs:
  version:
    # Stable release stays push-only: workflow_dispatch on stable must not publish versions.
    if: github.repository == 'webspatial/webspatial-sdk' && github.ref == 'refs/heads/stable' && github.event_name == 'push'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Use full git history to enable tagging

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: "pnpm"

      - name: Update npm
        run: npm install -g npm@'>=11.5.1'

      - name: Install dependencies and build
        run: pnpm run setup

      - name: Create and publish versions
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: update versions"
          title: "chore: update versions"
          publish: pnpm ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use OIDC for npm authentication instead of NPM_TOKEN
          NPM_TOKEN: '' # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868

      - name: Create and push Git tags for published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # get version from publishedPackages JSON first element
          version=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[0].version')
          tag="v${version}"

          echo "Creating tag $tag"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping."
          else
            git tag "$tag"
          fi

          # push tags
          git push origin "$tag"

  publish-beta:
    if: github.repository == 'webspatial/webspatial-sdk' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    concurrency:
      group: changesets-npm-beta-${{ github.ref }}
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changesets
        id: changesets
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup node.js
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Verify npm trusted publishing support
        if: steps.changesets.outputs.has_changesets == 'true'
        run: |
          hash -r
          node --version
          npm --version
          node -e "const version = require('child_process').execFileSync('npm', ['--version'], { encoding: 'utf8' }).trim().split('.').map(Number); if (version[0] < 11 || (version[0] === 11 && version[1] < 5)) { throw new Error('npm >= 11.5.1 is required for trusted publishing'); }"

      - name: Install dependencies
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm install --frozen-lockfile

      - name: Version packages for beta snapshot
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm exec changeset version --snapshot beta --snapshot-prerelease-template "{tag}-{commit}"

      - name: Build packages
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm run buildPackages

      - name: Publish packages to npm beta
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm exec changeset publish --tag beta --no-git-tag
        env:
          # Use OIDC for npm authentication instead of NPM_TOKEN.
          NPM_TOKEN: ''

  sync_main:
    name: Sync stable to main
    needs: version
    if: needs.version.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: 'main'
          fetch-depth: 0

      - name: Reset main to stable
        run: |
          git fetch origin stable
          git reset --hard origin/stable

      - name: Create sync PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: sync stable → main'
          title: 'Merge stable into main'
          token: ${{ secrets.PAT_TOKEN }}
          body: |
            This pull request was created automatically by GitHub Actions.
            It merges the latest release from `stable` into `main` again.
          branch: 'stable-merge-main'
          base: 'main'
          labels: 'BranchAutoMerge'
          delete-branch: true
