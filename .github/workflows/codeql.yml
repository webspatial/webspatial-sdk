name: CodeQL

on:
  push:
    branches:
      - main
      - stable
  pull_request:
    branches:
      - main
      - stable
  schedule:
    - cron: '31 4 * * 2'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze-javascript-typescript:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  analyze-swift:
    name: Analyze Swift
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install visionOS simulator runtime
        run: |
          xcodebuild -downloadPlatform visionOS
          xcrun simctl create "CodeQL Apple Vision Pro" "com.apple.CoreSimulator.SimDeviceType.Apple-Vision-Pro" "com.apple.CoreSimulator.SimRuntime.xrOS-26-2"
          xcrun simctl list runtimes
          xcrun simctl list devices available
          xcrun simctl list devicetypes

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build visionOS app
        run: |
          xcodebuild build \
            -project packages/visionOS/web-spatial.xcodeproj \
            -scheme web-spatial \
            -configuration Debug \
            -sdk xrsimulator \
            -destination 'generic/platform=visionOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/webspatial-derived-data" \
            ARCH=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:swift'
